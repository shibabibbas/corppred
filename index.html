const LMSR = {
  cost(q,b=100){return b*Math.log(Math.exp(q[0]/b)+Math.exp(q[1]/b))},
  price(q,o,b=100){const e=q.map(x=>Math.exp(x/b));return e[o]/e.reduce((a,c)=>a+c,0)},
  buy(q,o,s,b=100){const bf=LMSR.cost(q,b);const nq=[...q];nq[o]+=s;return{newQ:nq,cost:LMSR.cost(nq,b)-bf}}
};

    const ref=db.ref('markets');

    const q=currentQuarter();
    db.ref('user_trades/'+userId+'/lastTokenQuarter').once('value').then(s=>{
      if(s.val()!==q){
        const newCr=(existingCredits||0)+1000;

        db.ref('user_trades/'+userId+'/lastTokenQuarter').set(q);
        setCredits(newCr);
        setToast('New quarter! 1,000 credits added.');
      }
    });
  };

  /* Session restore */
  useEffect(()=>{
    const saved=localStorage.getItem('pg_prediction_session');
    if(!saved)return;
    try{
      const{uid:savedUid,name}=JSON.parse(saved);
      if(!savedUid)return;
      db.ref('user_trades/'+savedUid).once('value').then(s=>{
        if(s.exists()){
          uid.current=savedUid;
          const d=s.val();
          const n=d.name||name;

          setCredits(d.credits||1000);
          setFirstEstimates(d.firstEstimates||{});
          setReputation(d.reputation||null);
          setView("markets");
          checkQuarterlyTokens(savedUid,d.credits||1000);
        }else{localStorage.removeItem('pg_prediction_session')}
      });
    }catch(e){localStorage.removeItem('pg_prediction_session')}
  },[]);

  /* Deadline notification check */
  const [deadlineNotifs,setDeadlineNotifs]=useState({});
  useEffect(()=>{
    if(!user||!Object.keys(markets).length)return;
    const today=new Date().toISOString().split('T')[0];
    Object.entries(markets).forEach(([id,m])=>{
      if(m.resolved||m.pendingResolution)return;
      if(m.deadline&&m.deadline<=today&&!deadlineNotifs[id]){
        setDeadlineNotifs(prev=>({...prev,[id]:true}));
        if(m.creator===user.name){

          setReputation(data.reputation||null);
          localStorage.setItem('pg_prediction_session',JSON.stringify({uid:existingUid,name:data.name}));
          setView("markets");setToast(`Welcome back ${u.name}! Session restored.`);
          checkQuarterlyTokens(existingUid,data.credits||1000);
        }else{
          const id='u_'+Math.random().toString(36).substr(2,9);
          uid.current=id;
          const u={name:trimmed,avatar:trimmed[0].toUpperCase()};
          setUser(u);setCredits(1000);
          const q=currentQuarter();
          db.ref('user_trades/'+id).set({credits:1000,positions:{},history:{},name:u.name,lastTokenQuarter:q});
          localStorage.setItem('pg_prediction_session',JSON.stringify({uid:id,name:u.name}));
          setView("markets");setToast(`Welcome ${u.name}! 1,000 credits credited.`);
        }
        if(cb)cb();
      });
    }else{
      const id='u_'+Math.random().toString(36).substr(2,9);
      uid.current=id;
      const u={name:"Anon_"+id.slice(2,6),avatar:"A"};
      setUser(u);setCredits(1000);
      const q=currentQuarter();
      db.ref('user_trades/'+id).set({credits:1000,positions:{},history:{},name:u.name,lastTokenQuarter:q});
      localStorage.setItem('pg_prediction_session',JSON.stringify({uid:id,name:u.name}));
      setView("markets");setToast(`Welcome ${u.name}! 1,000 credits credited.`);
      if(cb)cb();
    }
  };

  const trade=(mktId,outcome,shares)=>{
    const m=markets[mktId];if(!m||m.resolved!=null)return;
    const q=m.q||[0,0];
    const{newQ,cost}=LMSR.buy(q,outcome,shares);
    if(cost>credits){setToast("Insufficient credits!");return}
    db.ref('markets/'+mktId).transaction(c=>{
      if(!c)return c;const cq=c.q||[0,0];cq[outcome]+=shares;c.q=cq;c.trades=(c.trades||0)+1;c.volume=(c.volume||0)+Math.round(cost);return c;
    });
    /* Phase 7: hourly snapshot */
    const hourKey=new Date().toISOString().slice(0,13).replace(/[^0-9]/g,'');
    db.ref('snapshots/'+mktId+'/'+hourKey).transaction(v=>v!==null?v:LMSR.price(newQ,0));
    const id=uid.current;const pk=`${mktId}_${outcome}`;
    const ex=positions.find(p=>p.key===pk);
    const np=ex?{...ex,shares:ex.shares+shares,avgCost:(ex.avgCost*ex.shares+cost)/(ex.shares+shares)}:{key:pk,marketId:mktId,outcome,shares,avgCost:cost/shares,title:m.title};
    const nc=Math.round((credits-cost)*100)/100;
    db.ref('user_trades/'+id+'/credits').set(nc);
    db.ref('user_trades/'+id+'/positions/'+pk).set(np);
    db.ref('user_trades/'+id+'/history').push({marketId:mktId,title:m.title,outcome:outcome===0?"YES":"NO",shares,cost:cost.toFixed(2),time:new Date().toLocaleTimeString(),prob:pct(LMSR.price(newQ,0))});
    setToast(`Bought ${shares} ${outcome===0?"YES":"NO"} for ${cost.toFixed(1)} cr`);setShowTrade(null);
  };

  const createMkt=(title,cat,dl,desc,type,dept,resSrc,resVer)=>{
    db.ref('markets/m'+Date.now()).set({title,category:cat,type:type||"milestone",q:[0,0],deadline:dl,creator:user.name,department:dept,resolutionSource:resSrc,resolutionVerifier:resVer,description:desc||"",resolved:null,pendingResolution:null,dispute:null,trades:0,volume:0});
    setShowCreate(false);setToast(`Market created: "${title}"`);
  };

  /* Phase 6: creator claims resolution — also notifies verifier */
  const claimResolution=(mktId,outcome)=>{
    const m=markets[mktId];
    db.ref('markets/'+mktId+'/pendingResolution').set({outcome,claimedBy:user.name,claimedAt:Date.now()});
    /* Send notification to verifier account */
    if(m&&m.resolutionVerifier){
      db.ref('user_trades').orderByChild('name').equalTo(m.resolutionVerifier).once('value').then(s=>{
        if(s.exists()){
          Object.keys(s.val()).forEach(vUid=>{
            db.ref('notifications/'+vUid).push({
              type:'verify_resolution',
              marketId:mktId,
              title:m.title,
              outcome,
              claimedBy:user.name,
              message:`Please verify resolution for "${m.title}" — claimed ${outcome.toUpperCase()} by ${user.name}`,
              read:false,
              createdAt:Date.now()
            });
          });
        }
      });
    }
    setShowResolve(null);setToast('Resolution claimed. Verifier has been notified.');
  };

  /* Phase 6: verifier confirms — triggers payouts + Phase 4 reputation */
  const confirmResolution=(mktId,outcome)=>{
    db.ref('markets/'+mktId+'/resolved').set(outcome);
    db.ref('markets/'+mktId+'/pendingResolution').set(null);
    db.ref('user_trades').once('value').then(s=>{
      if(!s.exists())return;
      const outcomeNum=outcome==="yes"?0:1;
      Object.entries(s.val()).forEach(([uid2,ud])=>{
        if(!ud.positions)return;
        Object.values(ud.positions).forEach(pos=>{
          if(pos.marketId===mktId&&((outcome==="yes"&&pos.outcome===0)||(outcome==="no"&&pos.outcome===1)))
            db.ref('user_trades/'+uid2+'/credits').transaction(c=>(c||0)+pos.shares);
        });
        /* Phase 4: Brier score */
        const fe=ud.firstEstimates&&ud.firstEstimates[mktId];
        const hasPos=ud.positions&&Object.values(ud.positions).some(p=>p.marketId===mktId);
        if(fe!=null&&hasPos){
          const estimate=(fe.estimate||0)/100;
          const brier=(estimate-outcomeNum)*(estimate-outcomeNum);
          db.ref('user_trades/'+uid2+'/reputation').transaction(r=>{
            if(!r)return{brierSum:brier,marketCount:1};
            return{brierSum:(r.brierSum||0)+brier,marketCount:(r.marketCount||0)+1};
          });
        }
      });
    });
    setToast(`Resolved ${outcome.toUpperCase()}! Payouts sent.`);
  };

  /* Phase 6: dispute */
  const disputeResolution=(mktId,reason)=>{
    db.ref('markets/'+mktId+'/dispute').set({filedBy:user.name,reason,filedAt:Date.now()});
    setToast('Dispute filed. Governance panel notified.');
  };

  /* Phase 3: submit first estimate — auto-stakes tokens based on estimate */
  const submitEstimate=(mktId,estimate)=>{
    db.ref('user_trades/'+uid.current+'/firstEstimates/'+mktId).set({estimate,submittedAt:Date.now()});
    setFirstEstimates(fe=>({...fe,[mktId]:{estimate,submittedAt:Date.now()}}));
    setShowEstimate(false);
    /* Auto-stake: place a trade based on estimate direction */
    const m=markets[mktId];if(!m||m.resolved!=null)return;
    const autoShares=10;
    const outcome=estimate>=50?0:1; /* YES if estimate>=50%, NO otherwise */
    const q=m.q||[0,0];
    const{newQ,cost}=LMSR.buy(q,outcome,autoShares);
    if(cost<=credits){
      db.ref('markets/'+mktId).transaction(c=>{
        if(!c)return c;const cq=c.q||[0,0];cq[outcome]+=autoShares;c.q=cq;c.trades=(c.trades||0)+1;c.volume=(c.volume||0)+Math.round(cost);return c;
      });
      const hourKey=new Date().toISOString().slice(0,13).replace(/[^0-9]/g,'');
      db.ref('snapshots/'+mktId+'/'+hourKey).transaction(v=>v!==null?v:LMSR.price(newQ,0));
      const id=uid.current;const pk=`${mktId}_${outcome}`;
      const ex=positions.find(p=>p.key===pk);
      const np=ex?{...ex,shares:ex.shares+autoShares,avgCost:(ex.avgCost*ex.shares+cost)/(ex.shares+autoShares)}:{key:pk,marketId:mktId,outcome,shares:autoShares,avgCost:cost/autoShares,title:m.title};
      const nc=Math.round((credits-cost)*100)/100;
      db.ref('user_trades/'+id+'/credits').set(nc);
      db.ref('user_trades/'+id+'/positions/'+pk).set(np);
      db.ref('user_trades/'+id+'/history').push({marketId:mktId,title:m.title,outcome:outcome===0?"YES":"NO",shares:autoShares,cost:cost.toFixed(2),time:new Date().toLocaleTimeString(),prob:pct(LMSR.price(newQ,0))});
      setToast(`Estimate submitted! Auto-staked ${autoShares} ${outcome===0?"YES":"NO"} shares (${cost.toFixed(1)} cr)`);
    }else{
      setToast('Estimate submitted! (Insufficient credits for auto-stake)');
    }
  };

  const openDetail=(mktId)=>{
    setSelMkt(mktId);
    const m=markets[mktId];
    const isRestricted=user&&(user.name===(m?.creator)||user.name===(m?.resolutionVerifier));
    if(!firstEstimates[mktId]&&!isRestricted&&m&&!m.resolved){
      setShowEstimate(true);
    }
    setView("detail");

  const totalPnl=useMemo(()=>positions.reduce((s,p)=>{const m=markets[p.marketId];if(!m)return s;const cp=LMSR.price(m.q||[0,0],p.outcome);return s+(cp*p.shares-p.avgCost*p.shares)},0),[positions,markets]);
  const mktList=Object.entries(markets).map(([id,m])=>({id,...m}));
  const hasCharts=!!BarChart;

  const isSuperPredictor=(rep)=>rep&&rep.marketCount>=5&&(rep.brierSum/rep.marketCount)<0.10;

  // ── Nav ──
  const Nav=()=>(

        {liveN>0&&<span className="flex items-center gap-1 text-xs text-green-600 bg-green-50 px-2 py-0.5 rounded-full"><span className="w-1.5 h-1.5 bg-green-500 rounded-full live-dot"/>{participationRange(liveN)}</span>}
      </div>
      <div className="flex gap-1">
        {[{k:"markets",icon:"TrendingUp",l:"Markets"},{k:"dashboard",icon:"LayoutDashboard",l:"Dashboard"},{k:"portfolio",icon:"Wallet",l:"Portfolio"},{k:"leaderboard",icon:"Trophy",l:"Board"},{k:"analytics",icon:"BarChart3",l:"Stats"}].map(({k,icon,l})=>{

            onKeyDown={e=>e.key==="Enter"&&handleLogin()}

          {nameErr?<p className="text-xs text-red-400 mb-2">Both name and company login ID are required.</p>:<div className="mb-2"/>}
          <button onClick={handleLogin} className="w-full flex items-center justify-center gap-2 bg-white text-indigo-900 font-semibold py-3 rounded-xl hover:bg-indigo-50 text-sm">
            <I.LogIn size={16}/>Join &amp; Get 1,000 Credits
          </button>

        <div className="grid grid-cols-3 gap-4 max-w-2xl mt-8">
          {[["Incentive-Aligned","Credits on the line. No groupthink. 73% more accurate than surveys.","Zap"],

  // ── Type badge (Phase 1) ──

  };

  // ── Card ──
  const Card=({m})=>{
    const q=m.q||[0,0];const p=LMSR.price(q,0);const res=m.resolved!=null;
    const pending=m.pendingResolution&&!m.resolved&&!m.dispute;
    const disputed=m.dispute&&!m.resolved;
    const hasVoted=!!firstEstimates[m.id]||res;
    return(
      <div onClick={()=>openDetail(m.id)} className={`bg-white rounded-xl border hover:shadow-md hover:border-indigo-200 cursor-pointer ${res?"opacity-70":""}`}>
        <div className="p-4">
          <div className="flex items-start justify-between mb-2 gap-1 flex-wrap">
            <span className="text-xs font-medium px-2 py-0.5 rounded-full" style={{backgroundColor:(CAT_COL[m.category]||"#666")+"18",color:CAT_COL[m.category]||"#666"}}>{m.category}</span>
            <div className="flex gap-1 items-center flex-wrap">
              <TypeBadge type={m.type}/>
              {res?<span className={`text-xs font-bold px-2 py-0.5 rounded-full ${m.resolved==="yes"?"bg-green-100 text-green-700":"bg-red-100 text-red-700"}`}>{String(m.resolved).toUpperCase()}</span>
              :pending?<span className="text-xs font-bold px-2 py-0.5 rounded-full bg-amber-100 text-amber-700">Awaiting Verification</span>
              :disputed?<span className="text-xs font-bold px-2 py-0.5 rounded-full bg-red-100 text-red-700">Under Review</span>
              :<div className="flex items-center gap-1 text-xs text-gray-400"><I.Clock size={11}/>{m.deadline}</div>}
            </div>
          </div>
          <h3 className="font-semibold text-gray-900 text-sm leading-snug mb-3 min-h-[2.5rem]">{m.title}</h3>
          {hasVoted?<div className="mb-2">
            <div className="flex justify-between text-xs mb-1"><span className="font-semibold text-green-600">YES {pct(p)}</span><span className="font-semibold text-red-500">NO {pct(1-p)}</span></div>
            <div className="w-full bg-red-100 rounded-full h-2.5"><div className="bg-green-500 h-2.5 rounded-full transition-all" style={{width:`${p*100}%`}}/></div>
          </div>:<div className="mb-2">

            <div className="w-full bg-gray-200 rounded-full h-2.5"><div className="bg-gray-300 h-2.5 rounded-full" style={{width:"50%"}}/></div>

  // ── Detail ──
  const Detail=()=>{

                {pending&&!res&&!disputed&&<span className="text-xs font-bold px-2 py-0.5 rounded-full bg-amber-100 text-amber-700">Awaiting Verification</span>}
                {disputed&&!res&&<span className="text-xs font-bold px-2 py-0.5 rounded-full bg-red-100 text-red-700">Under Review — Governance Panel</span>}
              </div>
              <h2 className="text-lg font-bold text-gray-900 mb-4">{m.title}</h2>
              {pending&&!res&&<div className="bg-amber-50 border border-amber-200 rounded-lg p-3 mb-3 text-sm">

  // ── Portfolio ──

            <td className="px-3 py-2.5 text-sm font-bold" style={{color:p.pnl>=0?"#059669":"#dc2626"}}>{p.pnl>=0?"+":""}{p.pnl.toFixed(1)}</td>
          </tr>)}</tbody></table></div>}
      </div>

  // ── Leaderboard ──
  const Leaderboard=()=>{
    const [fb,setFb]=useState([]);
    useEffect(()=>{const l=db.ref('user_trades').on('value',s=>{if(!s.exists())return;setFb(Object.entries(s.val()).map(([,d])=>({name:d.name||"Anon",score:Math.round(d.credits||0),live:true,rep:d.reputation||null})).sort((a,b)=>b.score-a.score))});return()=>db.ref('user_trades').off('value',l)},[]);
    const all=[...fb,...MOCK_LEADERS.map(m=>({...m,live:false,rep:null}))].sort((a,b)=>b.score-a.score);

          <table className="w-full"><thead className="bg-gray-50"><tr>{["#","Forecaster","Score","Accuracy",""].map(h=><th key={h} className="text-left text-xs font-medium text-gray-500 uppercase px-4 py-2">{h}</th>)}</tr></thead>
          <tbody className="divide-y divide-gray-100">{all.slice(0,15).map((p,i)=>{const isU=p.name===user?.name;const sp=isSuperPredictor(p.rep);const rs2=repScore(p.rep);return(
            <tr key={i} className={isU?"bg-indigo-50":"hover:bg-gray-50"}>
              <td className="px-4 py-2.5">{i<3?["\u{1F947}","\u{1F948}","\u{1F949}"][i]:<span className="text-xs text-gray-400">#{i+1}</span>}</td>
              <td className="px-4 py-2.5 text-sm font-medium"><div className="flex items-center gap-1.5">{p.name}{p.live&&<span className="w-1.5 h-1.5 bg-green-500 rounded-full live-dot"/>}{sp&&<span title="Super Predictor">⭐</span>}</div></td>
              <td className="px-4 py-2.5 text-sm font-bold text-indigo-600">{p.score.toLocaleString()}</td>
              <td className="px-4 py-2.5 text-xs text-gray-500">{rs2?`${rs2}/100`:"—"}</td>
              <td className="px-4 py-2.5">{isU&&<span className="text-xs bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded-full">You</span>}</td>
            </tr>)})}</tbody></table>

  // ── Analytics ──
  const Analytics=()=>{
    const act=mktList.filter(m=>!m.resolved);const res=mktList.filter(m=>!!m.resolved);
    const pd=act.slice(0,8).map(m=>({name:m.title.slice(0,20)+"...",yes:Math.round(LMSR.price(m.q||[0,0],0)*100),no:Math.round(LMSR.price(m.q||[0,0],1)*100)}));
    const cd=CATEGORIES.filter(c=>c!=="Custom").map(c=>({name:c,volume:mktList.filter(m=>m.category===c).reduce((s,m)=>s+(m.volume||0),0)}));

      <div className="max-w-6xl mx-auto space-y-5">

          {[["Markets",mktList.length,"TrendingUp"],["Active",act.length,"Play"],["Resolved",res.length,"CheckCircle"],["Volume",fmt(mktList.reduce((s,m)=>s+(m.volume||0),0)),"DollarSign"]].map(([l,v,icon])=>{

            <div className="bg-white rounded-xl border p-4"><h3 className="font-semibold text-sm mb-3">Volume by Category</h3><div className="h-56"><ResponsiveContainer><PieChart><Pie data={cd} cx="50%" cy="50%" outerRadius={75} dataKey="volume" label={({name,percent})=>`${name} ${(percent*100).toFixed(0)}%`}>{cd.map((_,i)=><Cell key={i} fill={COLORS[i]}/>)}</Pie><Tooltip/></PieChart></ResponsiveContainer></div></div>
          </div>
        ):(
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
            <div className="bg-white rounded-xl border p-4">
              <h3 className="font-semibold text-sm mb-3">Market Probabilities</h3>
              {pd.map(m=>(
                <div key={m.name} className="mb-2">
                  <p className="text-xs text-gray-600 mb-1 truncate">{m.name}</p>
                  <div className="w-full bg-red-100 rounded-full h-4 relative">
                    <div className="bg-green-500 h-4 rounded-full" style={{width:`${m.yes}%`}}/>
                    <span className="absolute left-2 top-0 text-xs font-bold text-white leading-4">{m.yes}%</span>
                  </div>
                </div>
              ))}
            </div>
            <div className="bg-white rounded-xl border p-4">
              <h3 className="font-semibold text-sm mb-3">Volume by Category</h3>
              {cd.map((c,i)=>{const max=Math.max(...cd.map(x=>x.volume),1);return(
                <div key={c.name} className="mb-2 flex items-center gap-2">
                  <span className="text-xs w-20 text-gray-600">{c.name}</span>
                  <div className="flex-1 bg-gray-100 rounded-full h-4"><div className="h-4 rounded-full" style={{width:`${(c.volume/max)*100}%`,backgroundColor:COLORS[i]}}/></div>
                  <span className="text-xs text-gray-500 w-12 text-right">{fmt(c.volume)}</span>
                </div>
              )})}
            </div>
          </div>
        )}
        <div className="bg-white rounded-xl border p-4">
          <h3 className="font-semibold text-sm mb-3">Why Prediction Markets Beat Surveys</h3>
          <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
            {[["Incentive-Aligned","Credits on the line eliminates groupthink. 73% more accurate than executive surveys.","Zap"],
              ["Info Aggregation","Each trade incorporates private info. Surfaces signals 3-6 weeks earlier.","Users"],
              ["Continuous","Real-time vs quarterly surveys. Reduces forecast lag to zero.","TrendingUp"]
            ].map(([t,d,icon])=>{const Ic=I[icon];return <div key={t} className="bg-gray-50 rounded-lg p-3"><Ic size={14} className="text-indigo-500 mb-1.5"/><h4 className="font-semibold text-sm mb-1">{t}</h4><p className="text-xs text-gray-600 leading-relaxed">{d}</p></div>})}

  // ── Dashboard — Phase 7 ──
  const Dashboard=()=>{
    const [snapshots,setSnapshots]=useState({});
    useEffect(()=>{
      const act=mktList.filter(m=>!m.resolved);
      if(act.length===0)return;
      Promise.all(act.map(m=>db.ref('snapshots/'+m.id).orderByKey().limitToLast(48).once('value').then(s=>({id:m.id,snaps:s.exists()?s.val():{}}))));
    },[]);
    useEffect(()=>{
      const act=mktList.filter(m=>!m.resolved);
      if(act.length===0)return;
      Promise.all(act.map(m=>db.ref('snapshots/'+m.id).orderByKey().limitToLast(48).once('value').then(s=>({id:m.id,snaps:s.exists()?s.val():{}})))).then(results=>{
        const s={};results.forEach(r=>{s[r.id]=r.snaps});setSnapshots(s);
      });
    },[markets]);
    const getTrend=(mktId,currentP)=>{
      const snaps=snapshots[mktId];if(!snaps)return null;
      const keys=Object.keys(snaps).sort();if(keys.length<2)return null;
      const old24Key=new Date(Date.now()-24*3600*1000).toISOString().slice(0,13).replace(/[^0-9]/g,'');
      const oldKeys=keys.filter(k=>k<=old24Key);
      const oldP=oldKeys.length>0?snaps[oldKeys[oldKeys.length-1]]:snaps[keys[0]];
      const diff=currentP-oldP;
      if(Math.abs(diff)<0.03)return"stable";
      return diff>0?"up":"down";
    };
    const act=mktList.filter(m=>!m.resolved);
    return(
      <div className="max-w-6xl mx-auto space-y-5">
        <div><h2 className="text-xl font-bold">Early-Warning Dashboard</h2><p className="text-gray-500 text-xs">Live market probabilities for leadership. Markets below 40% YES are flagged.</p></div>
        <div className="bg-white rounded-xl border overflow-x-auto">
          <table className="w-full">
            <thead className="bg-gray-50"><tr>{["Market","Type","YES Probability","Trend","Participation","Status"].map(h=><th key={h} className="text-left text-xs font-medium text-gray-500 uppercase px-4 py-3">{h}</th>)}</tr></thead>
            <tbody className="divide-y divide-gray-100">
              {act.map(m=>{
                const q=m.q||[0,0];const p=LMSR.price(q,0);

                  <tr key={m.id} className={`${warn?"bg-amber-50":"hover:bg-gray-50"} cursor-pointer`} onClick={()=>openDetail(m.id)}>
                    <td className="px-4 py-3 text-sm font-medium max-w-[200px]"><p className="truncate">{m.title}</p><p className="text-xs text-gray-400">{m.deadline}</p></td>
                    <td className="px-4 py-3"><TypeBadge type={m.type}/></td>
                    <td className="px-4 py-3">
                      <div className="flex items-center gap-2">
                        <div className="w-20 bg-red-100 rounded-full h-2"><div className="bg-green-500 h-2 rounded-full" style={{width:`${p*100}%`}}/></div>
                        <span className={`text-sm font-bold ${warn?"text-amber-700":"text-green-700"}`}>{pct(p)}</span>
                        {warn&&<I.AlertCircle size={14} className="text-amber-500"/>}
                      </div>
                    </td>
                    <td className="px-4 py-3">
                      {trend==="up"&&<span className="flex items-center gap-1 text-green-600 text-xs font-medium"><I.ArrowUp size={13}/>Rising</span>}
                      {trend==="down"&&<span className="flex items-center gap-1 text-red-500 text-xs font-medium"><I.ArrowDown size={13}/>Falling</span>}
                      {trend==="stable"&&<span className="text-gray-400 text-xs">— Stable</span>}
                      {!trend&&<span className="text-gray-300 text-xs">—</span>}
                    </td>
                    <td className="px-4 py-3 text-xs text-gray-500">{participationRange(m.trades||0)}</td>
                    <td className="px-4 py-3">
                      {m.pendingResolution&&!m.dispute&&<span className="text-xs bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full">Pending Verification</span>}
                      {m.dispute&&<span className="text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded-full">Disputed</span>}
                      {!m.pendingResolution&&!m.dispute&&warn&&<span className="text-xs bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full">Low Confidence</span>}
                      {!m.pendingResolution&&!m.dispute&&!warn&&<span className="text-xs bg-green-50 text-green-700 px-2 py-0.5 rounded-full">Active</span>}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          {act.length===0&&<p className="text-center text-gray-400 text-sm py-8">No active markets.</p>}
        </div>
        <div className="bg-indigo-50 rounded-xl p-4 text-sm text-indigo-700 flex items-start gap-2">
          <I.AlertCircle size={16} className="text-indigo-500 mt-0.5 shrink-0"/>
          <p>Markets below <span className="font-bold">40% YES probability</span> may warrant a project review or additional resource allocation. Signals complement, not replace, operational reporting.</p>
        </div>
      </div>
    );
  };

  // ── Modals ──
  const TradeM=()=>{
    const [sh,setSh]=useState(10);if(!showTrade)return null;
    const{marketId,outcome}=showTrade;const m=markets[marketId];if(!m)return null;
    const q=m.q||[0,0];const{newQ,cost}=LMSR.buy(q,outcome,sh);const np=LMSR.price(newQ,0);const isY=outcome===0;
    return(
      <div className="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4" onClick={()=>setShowTrade(null)}>
        <div className="bg-white rounded-2xl p-5 w-full max-w-sm shadow-2xl" onClick={e=>e.stopPropagation()}>
          <div className="flex justify-between items-center mb-2"><h3 className="font-bold">Buy {isY?"YES":"NO"}</h3><button onClick={()=>setShowTrade(null)}><I.X size={18} className="text-gray-400"/></button></div>
          <p className="text-sm text-gray-600 mb-3">{m.title}</p>
          <div className="mb-3"><label className="text-xs text-gray-600 mb-1 block">Shares</label>
            <input type="number" value={sh} onChange={e=>setSh(Math.max(1,+e.target.value))} className="w-full border rounded-lg px-3 py-2 text-lg font-semibold focus:ring-2 focus:ring-indigo-500 outline-none"/></div>
          <div className="bg-gray-50 rounded-lg p-3 mb-3 space-y-1 text-sm">
            <div className="flex justify-between"><span className="text-gray-500">Cost</span><span className="font-medium">{cost.toFixed(2)} cr</span></div>
            <div className="flex justify-between"><span className="text-gray-500">New Prob</span><span>{pct(np)}</span></div>
            <div className="flex justify-between"><span className="text-gray-500">Max Payout</span><span className="font-bold text-green-600">{sh} cr</span></div>
            {cost>credits&&<div className="text-red-500 text-xs flex items-center gap-1"><I.AlertCircle size={11}/>Need {cost.toFixed(0)}, have {credits.toFixed(0)}</div>}
          </div>
          <button onClick={()=>trade(marketId,outcome,sh)} disabled={cost>credits}
            className={`w-full font-semibold py-2.5 rounded-lg text-white ${isY?"bg-green-600 hover:bg-green-700":"bg-red-500 hover:bg-red-600"} ${cost>credits?"opacity-50":""}`}>
            Buy {isY?"YES":"NO"} · {cost.toFixed(1)} cr</button>
        </div>
      </div>
    );
  };

  // ── Create Market Modal — Phase 1 + Phase 2 ──
  const CreateM=()=>{
    const [t,setT]=useState("");
    const [c,setC]=useState("Custom");
    const [dl,setDl]=useState(new Date().toISOString().split('T')[0]);
    const [d,setD]=useState("");
    const [type,setType]=useState("milestone");
    const [dept,setDept]=useState("");
    const [resSrc,setResSrc]=useState("");
    const [resVer,setResVer]=useState("");
    if(!showCreate)return null;
    const canCreate=t.trim()&&dept.trim()&&resSrc.trim()&&resVer.trim();
    return(
      <div className="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4" onClick={()=>setShowCreate(false)}>
        <div className="bg-white rounded-2xl p-5 w-full max-w-md shadow-2xl overflow-y-auto max-h-[90vh]" onClick={e=>e.stopPropagation()}>
          <div className="flex justify-between items-center mb-3"><h3 className="font-bold flex items-center gap-2"><I.Plus size={18} className="text-green-600"/>New Market</h3><button onClick={()=>setShowCreate(false)}><I.X size={18} className="text-gray-400"/></button></div>
          <div className="space-y-3">
            <div>
              <label className="text-xs font-medium text-gray-700 mb-1.5 block">Forecast Type</label>
              <div className="grid grid-cols-3 gap-2">
                {Object.entries(TEMPLATES).map(([k,v])=>(
                  <button key={k} type="button" onClick={()=>setType(k)}
                    className={`py-2 px-1 rounded-lg border-2 text-xs font-semibold text-center transition-all`}
                    style={type===k?{borderColor:v.color,backgroundColor:v.color,color:"white"}:{borderColor:"#e5e7eb",color:"#4b5563"}}>
                    {v.label}
                  </button>
                ))}
              </div>
              <p className="text-xs text-gray-400 mt-1">{TEMPLATES[type].hint}</p>
            </div>
            <div><label className="text-xs font-medium text-gray-700 mb-1 block">Question (YES/NO)</label>
              <input value={t} onChange={e=>setT(e.target.value)} placeholder={TEMPLATES[type].hint}
                className="w-full border rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500"/></div>
            <div className="grid grid-cols-2 gap-2">
              <div><label className="text-xs font-medium text-gray-700 mb-1 block">Category</label>
                <select value={c} onChange={e=>setC(e.target.value)} className="w-full border rounded-lg px-3 py-2 text-sm bg-white outline-none">{CATEGORIES.map(x=><option key={x}>{x}</option>)}</select></div>
              <div><label className="text-xs font-medium text-gray-700 mb-1 block">Deadline</label>
                <input type="date" value={dl} onChange={e=>setDl(e.target.value)} className="w-full border rounded-lg px-3 py-2 text-sm outline-none"/></div>
            </div>
            <div className="border-t pt-3 space-y-2">
              <p className="text-xs font-semibold text-gray-600 flex items-center gap-1"><I.Shield size={12} className="text-indigo-500"/>Governance — required</p>
              <div><label className="text-xs font-medium text-gray-700 mb-1 block">Responsible Department <span className="text-red-500">*</span></label>
                <input value={dept} onChange={e=>setDept(e.target.value)} placeholder="e.g. Finance, Product, Sales..."
                  className="w-full border rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500"/></div>
              <div><label className="text-xs font-medium text-gray-700 mb-1 block">Resolution Source <span className="text-red-500">*</span></label>
                <input value={resSrc} onChange={e=>setResSrc(e.target.value)} placeholder="e.g. ERP System, Board Minutes..."
                  className="w-full border rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500"/></div>
              <div><label className="text-xs font-medium text-gray-700 mb-1 block">Resolution Verifier (account name) <span className="text-red-500">*</span></label>
                <input value={resVer} onChange={e=>setResVer(e.target.value)} placeholder="Exact name of verifier's account..."
                  className="w-full border rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500"/>
                <p className="text-xs text-gray-400 mt-0.5">Must match an existing account. This person will be notified and must verify the outcome before payouts. They cannot trade in this market.</p></div>
            </div>
          </div>
          <button onClick={()=>canCreate&&createMkt(t,c,dl,d,type,dept,resSrc,resVer)} disabled={!canCreate}
            className={`w-full mt-4 bg-green-600 text-white font-semibold py-2.5 rounded-lg hover:bg-green-700 ${!canCreate?"opacity-40":""}`}>
            Create Market</button>
        </div>
      </div>
    );
  };

  // ── Resolve Modal — Phase 6 (claim only) ──
  const ResolveM=()=>{
    if(!showResolve)return null;const m=showResolve;const q=m.q||[0,0];
    return(
      <div className="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4" onClick={()=>setShowResolve(null)}>
        <div className="bg-white rounded-2xl p-5 w-full max-w-xs shadow-2xl" onClick={e=>e.stopPropagation()}>
          <div className="flex justify-between items-center mb-2"><h3 className="font-bold">Claim Resolution</h3><button onClick={()=>setShowResolve(null)}><I.X size={18} className="text-gray-400"/></button></div>
          <p className="text-sm text-gray-600 mb-2">{m.title}</p>
          <p className="text-xs text-gray-400 mb-1">Final: YES {pct(LMSR.price(q,0))} · {participationRange(m.trades||0)}</p>
          <p className="text-xs text-amber-600 mb-3 flex items-center gap-1"><I.Shield size={11}/>{m.resolutionVerifier} must confirm before payouts are sent.</p>
          <div className="grid grid-cols-2 gap-2.5">
            <button onClick={()=>claimResolution(m.id,"yes")} className="bg-green-50 border-2 border-green-300 rounded-xl p-3.5 text-center hover:bg-green-100"><I.CheckCircle size={22} className="mx-auto text-green-600 mb-1"/><p className="font-bold text-green-700 text-sm">YES</p></button>
            <button onClick={()=>claimResolution(m.id,"no")} className="bg-red-50 border-2 border-red-300 rounded-xl p-3.5 text-center hover:bg-red-100"><I.X size={22} className="mx-auto text-red-500 mb-1"/><p className="font-bold text-red-600 text-sm">NO</p></button>
          </div>
        </div>
      </div>
    );
  };

  // ── First Estimate Modal — Phase 3 ──
  const FirstEstimateM=()=>{
    const [est,setEst]=useState(50);
    if(!showEstimate||!selMkt)return null;
    const m=markets[selMkt];if(!m)return null;
    return(
      <div className="fixed inset-0 bg-black bg-opacity-70 z-[60] flex items-center justify-center p-4">
        <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl">
          <div className="flex items-center gap-2 mb-1"><I.Target size={18} className="text-indigo-600"/><h3 className="font-bold text-gray-900">Your Independent Estimate</h3></div>
          <p className="text-xs text-gray-500 mb-4">Before seeing the current market price, what probability of YES would you assign?</p>
          <p className="text-sm font-semibold text-gray-800 mb-4 leading-snug">{m.title}</p>
          <div className="mb-4">
            <div className="flex justify-between text-xs text-gray-500 mb-1"><span>0%</span><span className="font-bold text-indigo-600 text-base">{est}% YES</span><span>100%</span></div>
            <input type="range" min={0} max={100} value={est} onChange={e=>setEst(+e.target.value)} className="w-full accent-indigo-600"/>
            <div className="mt-2 w-full bg-red-100 rounded-full h-3"><div className="bg-indigo-500 h-3 rounded-full transition-all" style={{width:`${est}%`}}/></div>
          </div>
          <div className="bg-amber-50 border border-amber-200 rounded-lg p-2.5 mb-3 text-xs text-amber-700">Your estimate will automatically stake 10 shares on your chosen direction ({est>=50?"YES":"NO"}).</div>
          <button onClick={()=>submitEstimate(selMkt,est)} className="w-full bg-indigo-600 text-white font-semibold py-2.5 rounded-lg hover:bg-indigo-700">Submit &amp; View Market</button>
          <p className="text-xs text-gray-400 mt-2 text-center">Used to track your forecasting accuracy over time.</p>
        </div>
      </div>
    );
  };

  // ── Notifications View ──
  const Notifications=()=>{
    const [allNotifs,setAllNotifs]=useState([]);
    useEffect(()=>{
      const ref=db.ref('notifications/'+uid.current);
      const l=ref.orderByChild('createdAt').on('value',s=>{
        if(!s.exists()){setAllNotifs([]);return}
        setAllNotifs(Object.entries(s.val()).map(([k,v])=>({id:k,...v})).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)));
      });
      return()=>ref.off('value',l);
    },[]);
    return(
      <div className="max-w-3xl mx-auto space-y-4">
        <h2 className="text-xl font-bold">Notifications</h2>
        {allNotifs.length===0?<div className="bg-white rounded-xl border p-8 text-center"><p className="text-gray-500 text-sm">No notifications yet.</p></div>
        :<div className="space-y-2">{allNotifs.map(n=>(
          <div key={n.id} className={`bg-white rounded-xl border p-4 ${n.read?"opacity-60":""}`}>
            <div className="flex items-start justify-between gap-2">
              <div className="flex-1">
                {n.type==='verify_resolution'&&<div className="flex items-center gap-1.5 mb-1"><I.Shield size={14} className="text-indigo-600"/><span className="text-xs font-semibold text-indigo-700">Verification Required</span></div>}
                {n.type==='deadline_reached'&&<div className="flex items-center gap-1.5 mb-1"><I.Clock size={14} className="text-orange-500"/><span className="text-xs font-semibold text-orange-700">Deadline Reached</span></div>}
                <p className="text-sm text-gray-800">{n.message}</p>
                <p className="text-xs text-gray-400 mt-1">{n.createdAt?new Date(n.createdAt).toLocaleString():""}</p>
              </div>
              <div className="flex gap-1.5">
                {n.type==='verify_resolution'&&n.marketId&&!n.read&&<button onClick={()=>{markNotifRead(n.id);setSelMkt(n.marketId);setView("detail")}} className="text-xs bg-indigo-600 text-white px-2.5 py-1 rounded-lg">Review</button>}
                {!n.read&&<button onClick={()=>markNotifRead(n.id)} className="text-xs text-gray-400 hover:text-gray-600 px-2 py-1">Dismiss</button>}
              </div>
            </div>
          </div>
        ))}</div>}
      </div>
    );
  };

  const WalletM=()=>null;

  const ShareM=()=>{
    const [cp2,setCp2]=useState(false);if(!showShare)return null;
    const url=window.location.href;
    return(
      <div className="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4" onClick={()=>setShowShare(false)}>
        <div className="bg-white rounded-2xl p-5 w-full max-w-sm shadow-2xl" onClick={e=>e.stopPropagation()}>
          <div className="flex justify-between items-center mb-3"><h3 className="font-bold">Share</h3><button onClick={()=>setShowShare(false)}><I.X size={18} className="text-gray-400"/></button></div>
          <p className="text-sm text-gray-500 mb-3">Share this URL. Everyone trades on the same markets in real-time.</p>
          <div className="flex items-center gap-2 bg-gray-100 rounded-lg p-2.5 mb-3">
            <input value={url} readOnly className="flex-1 bg-transparent text-xs outline-none truncate"/>
            <button onClick={()=>{navigator.clipboard.writeText(url);setCp2(true);setTimeout(()=>setCp2(false),2000)}}
              className="flex items-center gap-1 bg-indigo-600 text-white px-2.5 py-1 rounded-lg text-xs font-medium">
              {cp2?<><I.CheckCircle size={12}/>Done</>:<><I.Copy size={12}/>Copy</>}</button>
          </div>
          <div className="bg-indigo-50 rounded-lg p-3 space-y-1">
            <p className="text-xs font-semibold text-indigo-800">For your presentation:</p>
            <p className="text-xs text-indigo-600">1. Share URL or show QR</p>
            <p className="text-xs text-indigo-600">2. Attendees join → 1,000 credits</p>
            <p className="text-xs text-indigo-600">3. Create live market ("Will this overrun?")</p>
            <p className="text-xs text-indigo-600">4. Everyone trades → resolve at the end</p>
          </div>
        </div>
      </div>
    );
  };

  if(!user&&view!=="landing")setView("landing");

  return(
    <div className="min-h-screen bg-gray-50">
      <Toast/><TradeM/><CreateM/><ResolveM/><WalletM/><ShareM/><FirstEstimateM/>
      {view==="landing"?<Landing/>:<><Nav/><div className="p-3 sm:p-5">
        {view==="markets"&&<Markets/>}
        {view==="dashboard"&&<Dashboard/>}
        {view==="detail"&&<Detail/>}
        {view==="portfolio"&&<Portfolio/>}
        {view==="leaderboard"&&<Leaderboard/>}
        {view==="analytics"&&<Analytics/>}
        {view==="notifications"&&<Notifications/>}
      </div></>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
